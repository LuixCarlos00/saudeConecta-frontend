<div class="filtro-wrapper">

  <!-- Header -->
  <div class="filtro-header">
    <div class="filtro-header__left">
      <span class="filtro-header__icon">
        <i class="fa-solid fa-sliders"></i>
      </span>
      <span class="filtro-header__title">Filtrar Consultas</span>
    </div>
    <span class="tipo-chip"
          [class.tipo-chip--agendada]="!tipoPesquisaConcluidas"
          [class.tipo-chip--finalizada]="tipoPesquisaConcluidas">
      <i [class]="tipoPesquisaConcluidas ? 'fa-solid fa-circle-check' : 'fa-solid fa-calendar-check'"></i>
      {{ tipoPesquisaConcluidas ? 'Finalizadas' : 'Agendadas' }}
    </span>
  </div>

  <!-- Corpo -->
  <div class="filtro-body">

    <!-- Período -->
    <div class="filtro-field" [formGroup]="IntervaloDeDatas">
      <label class="filtro-label">
        <i class="fa-regular fa-calendar-days"></i>
        Período
        <span class="filtro-label__opt">opcional</span>
      </label>
      <mat-form-field class="date-field" appearance="outline">
        <mat-label>Selecione o período</mat-label>
        <mat-date-range-input [rangePicker]="picker">
          <input matStartDate formControlName="start" placeholder="Data inicial">
          <input matEndDate formControlName="end" placeholder="Data final">
        </mat-date-range-input>
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-date-range-picker #picker></mat-date-range-picker>
        <mat-hint>DD/MM/AAAA – DD/MM/AAAA</mat-hint>
      </mat-form-field>
    </div>

    <!-- Especialidade + Clínico -->
    <div *ngIf="podeVerFiltrosAvancados" class="filtro-row-2">

      <div class="filtro-field" [formGroup]="OpcoesCategorias">
        <label class="filtro-label">
          <i class="fa-solid fa-stethoscope"></i>
          Especialidade
        </label>
        <select class="filtro-input filtro-input--full" formControlName="Especialidade" [disabled]="carregandoEspecialidades">
          <option [value]="null">{{ carregandoEspecialidades ? 'Carregando...' : '— Selecione —' }}</option>
          <option *ngFor="let especialidade of especialidades" [value]="especialidade.nome">
            {{ especialidade.nome }}
          </option>
        </select>
      </div>

      <div class="filtro-field" [formGroup]="OpcoesMedicos">
        <label class="filtro-label">
          <i class="fa-solid fa-user-doctor"></i>
          Clínico
        </label>
        <select class="filtro-input filtro-input--full" formControlName="NomeMedico">
          <option [value]="null">— Selecione —</option>
          <option *ngFor="let medico of ListaMedicos" [value]="medico.id">
            Dr(a). {{ medico.nome }}
          </option>
        </select>
      </div>

    </div>

    <!-- Status da Consulta -->
    <div class="filtro-field" [formGroup]="OpcoesStatusConsulta">
      <label class="filtro-label">
        <i class="fa-solid fa-circle-dot"></i>
        Status da Consulta
        <span class="filtro-label__opt">opcional</span>
      </label>
      <div class="checkbox-grid">
        <label class="checkbox-item" *ngFor="let status of statusDisponiveis">
          <input type="checkbox"
                 [value]="status.value"
                 (change)="onCheckboxChange($event, status.value)"
                 style="accent-color: #667eea; width: 13px; height: 13px; cursor: pointer; margin: 0;">
          <span>{{ status.label }}</span>
        </label>
      </div>
    </div>

    <!-- Status de Pagamento (só Finalizadas) -->
    <div *ngIf="tipoPesquisaConcluidas" class="filtro-field" [formGroup]="OpcoesStatusPagamento">
      <label class="filtro-label">
        <i class="fa-solid fa-circle-dollar-to-slot"></i>
        Pagamento
        <span class="filtro-label__opt">opcional</span>
      </label>
      <select class="filtro-input filtro-input--full" formControlName="statusPagamento">
        <option [value]="null">— Selecione —</option>
        <option *ngFor="let statusPag of statusPagamentoOptions" [value]="statusPag.value">
          {{ statusPag.label }}
        </option>
      </select>
    </div>

  </div>

  <!-- Rodapé / Ações -->
  <div class="filtro-footer">
    <button class="filtro-btn filtro-btn--ghost" (click)="limparFiltros()" type="button">
      <i class="fa-solid fa-rotate-left"></i>
      Limpar
    </button>
    <button class="filtro-btn filtro-btn--primary" (click)="VerificaTipoDePesquisa()" type="button">
      <i class="fa-solid fa-magnifying-glass"></i>
      Pesquisar
    </button>
  </div>

</div>
