<section class="pep-section">
  <div class="pep-section__header">
    <h2 class="pep-section__title">
      <i class="fa-solid fa-id-card"></i>
      Identificação do Paciente
    </h2>
  </div>
  <div class="pep-section__body">
    <div class="identificacao-container">

      <!-- Dados do paciente carregados do backend -->
      <div class="form-section" *ngIf="dadosPaciente">
        <h3 class="form-section__title">
          <i class="fa-solid fa-user-circle"></i> Dados Cadastrais do Paciente
        </h3>
        <div class="form-grid form-grid--3">
          <div class="form-group" *ngIf="dadosPaciente.nome">
            <label class="form-label">Nome</label>
            <input class="form-input" type="text" [value]="dadosPaciente.nome" disabled />
          </div>
          <div class="form-group" *ngIf="dadosPaciente.cpf">
            <label class="form-label">CPF</label>
            <input class="form-input" type="text" [value]="dadosPaciente.cpf" disabled />
          </div>
          <div class="form-group" *ngIf="dadosPaciente.rg">
            <label class="form-label">RG</label>
            <input class="form-input" type="text" [value]="dadosPaciente.rg" disabled />
          </div>
          <div class="form-group" *ngIf="dadosPaciente.sexo">
            <label class="form-label">Sexo</label>
            <input class="form-input" type="text" [value]="dadosPaciente.sexo" disabled />
          </div>
          <div class="form-group" *ngIf="dadosPaciente.dataNascimento">
            <label class="form-label">Data de Nascimento</label>
            <input class="form-input" type="text" [value]="dadosPaciente.dataNascimento" disabled />
          </div>
          <div class="form-group" *ngIf="dadosPaciente.telefone">
            <label class="form-label">Telefone</label>
            <input class="form-input" type="text" [value]="dadosPaciente.telefone" disabled />
          </div>
          <div class="form-group" *ngIf="dadosPaciente.email">
            <label class="form-label">E-mail</label>
            <input class="form-input" type="text" [value]="dadosPaciente.email" disabled />
          </div>
          <div class="form-group" *ngIf="dadosPaciente.status">
            <label class="form-label">Status</label>
            <input class="form-input" type="text" [value]="dadosPaciente.status" disabled />
          </div>
        </div>
      </div>

      <!-- Endereço do paciente carregado do backend -->
      <div class="form-section" *ngIf="dadosPaciente?.endereco">
        <h3 class="form-section__title">
          <i class="fa-solid fa-location-dot"></i> Endereço
        </h3>
        <div class="form-grid form-grid--3">
          <div class="form-group" *ngIf="dadosPaciente.endereco.rua">
            <label class="form-label">Rua</label>
            <input class="form-input" type="text" [value]="dadosPaciente.endereco.rua" disabled />
          </div>
          <div class="form-group" *ngIf="dadosPaciente.endereco.numero">
            <label class="form-label">Número</label>
            <input class="form-input" type="text" [value]="dadosPaciente.endereco.numero" disabled />
          </div>
          <div class="form-group" *ngIf="dadosPaciente.endereco.complemento">
            <label class="form-label">Complemento</label>
            <input class="form-input" type="text" [value]="dadosPaciente.endereco.complemento" disabled />
          </div>
          <div class="form-group" *ngIf="dadosPaciente.endereco.bairro">
            <label class="form-label">Bairro</label>
            <input class="form-input" type="text" [value]="dadosPaciente.endereco.bairro" disabled />
          </div>
          <div class="form-group" *ngIf="dadosPaciente.endereco.municipio">
            <label class="form-label">Município</label>
            <input class="form-input" type="text" [value]="dadosPaciente.endereco.municipio" disabled />
          </div>
          <div class="form-group" *ngIf="dadosPaciente.endereco.uf">
            <label class="form-label">UF</label>
            <input class="form-input" type="text" [value]="dadosPaciente.endereco.uf" disabled />
          </div>
          <div class="form-group" *ngIf="dadosPaciente.endereco.cep">
            <label class="form-label">CEP</label>
            <input class="form-input" type="text" [value]="dadosPaciente.endereco.cep" disabled />
          </div>
          <div class="form-group" *ngIf="dadosPaciente.endereco.nacionalidade">
            <label class="form-label">Nacionalidade</label>
            <input class="form-input" type="text" [value]="dadosPaciente.endereco.nacionalidade" disabled />
          </div>
        </div>
      </div>

      <div *ngIf="pacienteLoading" style="padding: 16px; text-align: center; color: #64748b;">
        <i class="fa-solid fa-spinner fa-spin"></i> Carregando dados do paciente...
      </div>

      <div class="form-section">
        <h3 class="form-section__title">
          <i class="fa-solid fa-user-shield"></i> Responsável (se menor)
        </h3>
        <div class="form-grid form-grid--2">
          <div class="form-group">
            <label class="form-label">Nome do Responsável</label>
            <input class="form-input" type="text" [(ngModel)]="responsavel"
              placeholder="Nome completo do responsável" />
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3 class="form-section__title">
          <i class="fa-solid fa-calendar-days"></i> Controle do Tratamento
        </h3>
        <div class="form-grid form-grid--3">
          <div class="form-group">
            <label class="form-label">Início do Tratamento</label>
            <input class="form-input" type="date" [(ngModel)]="inicioTratamento" />
          </div>
          <div class="form-group">
            <label class="form-label">Término do Tratamento</label>
            <input class="form-input" type="date" [(ngModel)]="terminoTratamento" />
          </div>
          <div class="form-group">
            <label class="form-label">Interrupção</label>
            <input class="form-input" type="text" [(ngModel)]="interrupcao"
              placeholder="Motivo da interrupção, se houver" />
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
